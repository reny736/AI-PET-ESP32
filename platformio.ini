[platformio]
boards_dir = boards

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8
framework = arduino
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

lib_deps =
    bblanchon/ArduinoJson@^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DCONFIG_SPIRAM_SPEED_80M=1
    -DCONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=16
    -DCONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=32
    -DCONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=32
    -DCONFIG_MBEDTLS_MEM_ALLOC_MODE_CUSTOM=1
    -DCONFIG_MBEDTLS_CUSTOM_MEM_ALLOC_CAPS=SPIRAM
    -mfix-esp32-psram-cache-issue
